<link rel="stylesheet" type="text/css" href="/a/app/text_cmp/diffview.css"/>
<link rel="stylesheet" type="text/css" href="/a/app/text_cmp/text_tool.css"/>

<div class="text-tools-app" id="textCompareApp">
  <div class="text-tools-header">
    <h1>文本比较工具</h1>
    <div class="text-tools-status" id="status">准备就绪</div>
  </div>

  <div class="text-tools-controls">
    <button class="text-tools-btn text-tools-btn-primary" id="clearBtn">清除</button>
  </div>

  <div class="text-tools-container">
    <div class="text-tools-panel">
      <h2>原始文本</h2>
      <textarea class="text-tools-textarea" id="baseText" placeholder="在此粘贴原始文本..."></textarea>
    </div>

    <div class="text-tools-panel">
      <h2>修改后文本</h2>
      <textarea class="text-tools-textarea" id="newText" placeholder="在此粘贴修改后的文本..."></textarea>
    </div>
  </div>

  <div class="text-tools-stats" id="statsPanel" style="display: none;">
    <div class="text-tools-stat-item">
      <span class="text-tools-stat-label">差异总数：</span>
      <span class="text-tools-stat-value" id="diffCount">0</span>
    </div>
    <div class="text-tools-stat-item">
      <span class="text-tools-stat-label">增加行数：</span>
      <span class="text-tools-stat-value add" id="addCount">0</span>
    </div>
    <div class="text-tools-stat-item">
      <span class="text-tools-stat-label">删除行数：</span>
      <span class="text-tools-stat-value delete" id="deleteCount">0</span>
    </div>
  </div>

  <div class="text-tools-diff-container">
    <div class="text-tools-diff-title">差异对比（Side-by-Side 视图）</div>
    <div class="text-tools-diff-content">
      <div id="diffoutput"></div>
    </div>
  </div>
</div>

<br>
<b>说明：</b>
<ol>
  <li>本工具为纯前端实现。</li>
  <li>输入文本后会自动比较差异（300ms 延迟，避免频繁计算）。</li>
  <li>所有处理均在本地浏览器完成，文本不会上传到服务器，保证隐私安全。</li>
  <li>页面刷新后数据清空，无缓存保存。</li>
</ol>

<script src="/a/app/text_cmp/difflib.js"></script>
<script src="/a/app/text_cmp/diffview.js"></script>
<script>
(function() {
  'use strict';

  const baseTextarea = document.getElementById('baseText');
  const newTextarea = document.getElementById('newText');
  const clearBtn = document.getElementById('clearBtn');
  const diffOutput = document.getElementById('diffoutput');
  const status = document.getElementById('status');
  const statsPanel = document.getElementById('statsPanel');
  const diffCount = document.getElementById('diffCount');
  const addCount = document.getElementById('addCount');
  const deleteCount = document.getElementById('deleteCount');

  let debounceTimer = null;

  function debounce(func, wait) {
    return function() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(func, wait);
    };
  }

  function updateStats(baseLines, newLines, opcodes) {
    let diffTotal = 0;
    let adds = 0;
    let deletes = 0;

    opcodes.forEach(function(opcode) {
      const change = opcode[0];
      const baseStart = opcode[1];
      const baseEnd = opcode[2];
      const newStart = opcode[3];
      const newEnd = opcode[4];

      if (change === 'replace') {
        diffTotal++;
        adds += newEnd - newStart;
        deletes += baseEnd - baseStart;
      } else if (change === 'delete') {
        diffTotal++;
        deletes += baseEnd - baseStart;
      } else if (change === 'insert') {
        diffTotal++;
        adds += newEnd - newStart;
      }
    });

    diffCount.textContent = diffTotal;
    addCount.textContent = adds;
    deleteCount.textContent = deletes;
    statsPanel.style.display = 'flex';
  }

  function performDiff() {
    const baseText = baseTextarea.value;
    const newText = newTextarea.value;

    if (!baseText && !newText) {
      diffOutput.innerHTML = '';
      statsPanel.style.display = 'none';
      status.textContent = '等待输入...';
      return;
    }

    if (!baseText || !newText) {
      diffOutput.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--tools-muted);">请在两个文本框中都输入内容以进行比较</div>';
      statsPanel.style.display = 'none';
      status.textContent = '需要两个文本';
      return;
    }

    status.textContent = '正在比较...';

    try {
      const baseLines = difflib.stringAsLines(baseText);
      const newLines = difflib.stringAsLines(newText);
      const sm = new difflib.SequenceMatcher(baseLines, newLines);
      const opcodes = sm.get_opcodes();

      diffOutput.innerHTML = '';

      const diffView = diffview.buildView({
        baseTextLines: baseLines,
        newTextLines: newLines,
        opcodes: opcodes,
        baseTextName: '原始文本',
        newTextName: '修改后文本',
        contextSize: null,
        viewType: 0
      });

      diffOutput.appendChild(diffView);
      updateStats(baseLines, newLines, opcodes);
      status.textContent = '比较完成';
    } catch (error) {
      console.error('Diff error:', error);
      diffOutput.innerHTML = '<div style="color: var(--tools-danger); padding: 20px;">比较出错：' + error.message + '</div>';
      status.textContent = '比较出错';
    }
  }

  const debouncedDiff = debounce(performDiff, 300);

  baseTextarea.addEventListener('input', debouncedDiff);
  newTextarea.addEventListener('input', debouncedDiff);

  clearBtn.addEventListener('click', function() {
    baseTextarea.value = '';
    newTextarea.value = '';
    diffOutput.innerHTML = '';
    statsPanel.style.display = 'none';
    status.textContent = '已清除';
  });
})();
</script>
